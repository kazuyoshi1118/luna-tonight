<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ルナの今夜のひとこと</title>
<meta property="og:title" content="ルナの今夜のひとこと">
<meta property="og:description" content="毎晩日付が変わると、ルナのひとことも変わる。今夜のルナは、あんたに何を言うのか。">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">

<style>
  :root{
    --bg:#0a0506;
    --ink:#f3e9ea;
    --red:#c1121f;
    --red-deep:#7a0a12;
    --red-glow:rgba(193,18,31,.45);
    --muted:#8a7478;
    --card:#120a0c;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Zen Kaku Gothic New',sans-serif;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
    cursor:default;
  }
  /* 背景：黒赤ラジアル + 星 */
  .bg{position:fixed;inset:0;z-index:0;
    background:
      radial-gradient(120% 90% at 50% 35%, #2a0810 0%, #150508 45%, var(--bg) 80%);
  }
  #stars{position:fixed;inset:0;z-index:1;pointer-events:none}
  .scanline{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:.05;
    background:repeating-linear-gradient(0deg,#fff 0,#fff 1px,transparent 1px,transparent 3px)}
  .wrap{position:relative;z-index:3;min-height:100dvh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;padding:40px 22px 56px;text-align:center}

  .mark{font-family:'Oswald',sans-serif;letter-spacing:.5em;font-size:12px;
    color:var(--red);text-transform:uppercase;margin-left:.5em;opacity:0;animation:fade .9s .2s forwards}
  .date{font-family:'Oswald',sans-serif;color:var(--muted);font-size:13px;
    letter-spacing:.22em;margin-top:10px;opacity:0;animation:fade .9s .35s forwards}

  .stage{position:relative;margin:30px 0 8px;opacity:0;animation:fade 1s .5s forwards}
  .halo{position:absolute;left:50%;top:42%;width:300px;height:300px;transform:translate(-50%,-50%);
    background:radial-gradient(circle,var(--red-glow) 0%,transparent 62%);
    filter:blur(8px);z-index:-1;animation:breathe 5s ease-in-out infinite}
  .luna{width:168px;height:auto;display:block;filter:drop-shadow(0 14px 30px rgba(0,0,0,.6))}
  /* 立ち絵が未設定のときのプレースホルダー */
  .luna-ph{width:188px;height:240px;border:1px dashed var(--red-deep);border-radius:14px;
    display:flex;align-items:center;justify-content:center;color:var(--muted);
    font-size:12px;letter-spacing:.1em;line-height:1.8;background:rgba(193,18,31,.04)}

  .speech{max-width:620px;margin:6px auto 0;position:relative;opacity:0;animation:fade 1s .75s forwards}
  .quote-mark{font-family:'Cormorant Garamond',serif;font-size:64px;color:var(--red-deep);
    line-height:0;height:30px;display:block}
  .line{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:var(--muted);
    letter-spacing:.04em;margin-bottom:14px}
  .words{font-size:clamp(20px,5.4vw,30px);font-weight:500;line-height:1.85;
    text-shadow:0 2px 18px rgba(0,0,0,.7)}
  .words .em{color:var(--red);font-weight:700}

  .tag{margin-top:22px;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.28em;
    color:var(--muted);text-transform:uppercase;opacity:0;animation:fade 1s 1s forwards}

  .cta{margin-top:30px;display:flex;gap:14px;flex-wrap:wrap;justify-content:center;
    opacity:0;animation:fade 1s 1.15s forwards}
  .btn{font-family:'Oswald',sans-serif;letter-spacing:.16em;font-size:13px;text-transform:uppercase;
    text-decoration:none;padding:13px 26px;border-radius:2px;transition:.25s;position:relative;overflow:hidden}
  .btn-primary{background:var(--red);color:#fff;box-shadow:0 6px 22px var(--red-glow)}
  .btn-primary:hover{background:#e01524;transform:translateY(-2px);box-shadow:0 10px 28px var(--red-glow)}
  .btn-ghost{border:1px solid var(--red-deep);color:var(--ink)}
  .btn-ghost:hover{border-color:var(--red);background:rgba(193,18,31,.08);transform:translateY(-2px)}

  .share{margin-top:26px;opacity:0;animation:fade 1s 1.3s forwards}
  .share-btn{background:none;border:none;cursor:pointer;color:var(--muted);
    font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:.18em;text-transform:uppercase;
    border-bottom:1px solid transparent;padding-bottom:3px;transition:.25s}
  .share-btn:hover{color:var(--red);border-bottom-color:var(--red)}

  .foot{margin-top:42px;font-family:'Cormorant Garamond',serif;font-style:italic;
    color:var(--red-deep);font-size:14px;opacity:0;animation:fade 1s 1.45s forwards}
  .accent-line{width:46px;height:2px;background:var(--red);margin:30px auto 0;
    opacity:0;animation:grow 1.2s 1.5s forwards}

  @keyframes fade{to{opacity:1}}
  @keyframes grow{from{width:0;opacity:0}to{width:46px;opacity:1}}
  @keyframes breathe{0%,100%{opacity:.55;transform:translate(-50%,-50%) scale(1)}
    50%{opacity:.9;transform:translate(-50%,-50%) scale(1.08)}}
  .twinkle{animation:tw 3s ease-in-out infinite}
  @keyframes tw{0%,100%{opacity:.2}50%{opacity:1}}
</style>
</head>

const MOOD_LABEL = {
  mon:"— Monday / 新曲の夜 —",
  wed:"— Wednesday / ひとりの夜 —",
  fri:"— Friday / 夜を走る人へ —",
  sun:"— Sunday / あんたたちへ —",
  any:"— Tonight —",
};
const MOOD_TAG = {
  mon:"NEW SONG", wed:"LUNA SOLO", fri:"MIDNIGHT", sun:"FOR YOU", any:"TONIGHT",
};

// 送客先（必要に応じて編集）
const SITE_URL = "https://luna-site-nine.vercel.app/";
// ------------------------------------------------------------------------

// JSTで「今日」を取得（日付が変わると内容が変わる基準を日本時間に固定）
function todayJST(){
  const now = new Date();
  const jst = new Date(now.getTime() + (now.getTimezoneOffset()+540)*60000);
  return jst;
}
function dayKey(d){
  const wd = d.getDay(); // 0=日,1=月...6=土
  if(wd===1) return 'mon';
  if(wd===3) return 'wed';
  if(wd===5) return 'fri';
  if(wd===0) return 'sun';
  return 'any';
}
// 日付文字列 → 数値シード
function seedFrom(d){
  const s = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  let h=0; for(let i=0;i<s.length;i++){h=(h*31 + s.charCodeAt(i))>>>0;}
  return h;
}

const d = todayJST();
const key = dayKey(d);
const pool = LINES[key].concat(LINES.any);
const seed = seedFrom(d);
const pick = pool[seed % pool.length];

document.getElementById('words').innerHTML = pick;
document.getElementById('lineLabel').textContent = MOOD_LABEL[key];
document.getElementById('moodTag').textContent = MOOD_TAG[key];

const wdJp = ['日','月','火','水','木','金','土'][d.getDay()];
document.getElementById('dateLabel').textContent =
  `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${wdJp})`;

// CTA：曲リンク（サイトに飛ばす。後で個別曲URLに変えてもOK）
document.getElementById('ctaSong').href = SITE_URL;

// 共有：今夜のセリフ＋このページURLをXに
document.getElementById('shareBtn').addEventListener('click',()=>{
  const plain = pick.replace(/<[^>]+>/g,'');
  const text = `今夜のルナのひとこと：\n「${plain}」\n\n#ルナ #AIシンガー\n`;
  const url = location.href.split('?')[0];
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`,'_blank','noopener');
});

// 星空キャンバス
const cv = document.getElementById('stars'), cx = cv.getContext('2d');
let stars=[];
function resize(){cv.width=innerWidth;cv.height=innerHeight;
  stars=Array.from({length:Math.min(140,Math.floor(innerWidth/9))},()=>({
    x:Math.random()*cv.width,y:Math.random()*cv.height,
    r:Math.random()*1.3+.2,a:Math.random(),sp:Math.random()*.012+.003}));}
function draw(){cx.clearRect(0,0,cv.width,cv.height);
  for(const s of stars){s.a+=s.sp;const o=(Math.sin(s.a)+1)/2;
    cx.beginPath();cx.arc(s.x,s.y,s.r,0,7);
    cx.fillStyle=`rgba(${o>.6?'255,210,215':'255,255,255'},${o*.8})`;cx.fill();}
  requestAnimationFrame(draw);}
resize();draw();addEventListener('resize',resize);
</script>
